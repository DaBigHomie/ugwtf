name: Visual Audit
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'app/**'
      - '*.css'
      - '*.tsx'
      - '*.ts'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx @dabighomie/audit-orchestrator --json > audit-results.json
      - name: Post audit results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('audit-results.json', 'utf8');
            const result = JSON.parse(raw);
            const score = result.score;
            const icon = score >= 80 ? ':white_check_mark:' : score >= 50 ? ':warning:' : ':x:';
            const issues = result.issues || [];
            const critical = issues.filter(i => i.severity === 'error').length;
            const warnings = issues.filter(i => i.severity === 'warning').length;

            let body = `## ${icon} Visual Audit: ${score}%\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Score | **${score}%** |\n`;
            body += `| Critical Issues | ${critical} |\n`;
            body += `| Warnings | ${warnings} |\n`;
            body += `| Total Issues | ${issues.length} |\n\n`;

            if (issues.length > 0) {
              body += `### Top Issues\n\n`;
              for (const issue of issues.slice(0, 10)) {
                const sev = issue.severity === 'error' ? ':x:' : ':warning:';
                body += `- ${sev} **${issue.rule}**: ${issue.message}\n`;
              }
              if (issues.length > 10) {
                body += `\n_...and ${issues.length - 10} more. See \`audit-results.json\` artifact._\n`;
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('Visual Audit:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results
          path: audit-results.json
