name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  # C14: Post audit scoreboard as PR comment
  pr-scoreboard:
    name: PR Scoreboard
    if: github.event_name == 'pull_request'
    needs: [type-check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run audit
        env:
          GITHUB_TOKEN: ${{ secrets.UGWTF_PAT || secrets.GITHUB_TOKEN }}
        run: npx tsx src/index.ts audit --output markdown --dry-run || true

      - name: Post scoreboard comment
        if: hashFiles('.ugwtf/SCOREBOARD.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const scoreboard = fs.readFileSync('.ugwtf/SCOREBOARD.md', 'utf8');
            const marker = '<!-- ugwtf-scoreboard -->';
            const body = `${marker}\n${scoreboard}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
